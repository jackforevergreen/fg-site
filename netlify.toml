[build]
  command = "bun run build"
  publish = "dist"

# Configure secrets scanning
# Firebase client-side config values are safe to expose in bundled JS
# They are protected by Firebase Security Rules, not by hiding the keys
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "VITE_FIREBASE_API_KEY,VITE_FIREBASE_AUTH_DOMAIN,VITE_FIREBASE_PROJECT_ID,VITE_FIREBASE_STORAGE_BUCKET,VITE_FIREBASE_MESSAGING_SENDER_ID,VITE_FIREBASE_APP_ID,VITE_FIREBASE_MEASUREMENT_ID,VITE_YOUTUBE_API_KEY"

# Omit specific paths from secrets scanning
  SECRETS_SCAN_OMIT_PATHS = ".claude/**,.env.example,src/lib/firebase.ts"

# === REDIRECTS ===
# Order matters! Most specific first, SPA fallback last.

# Legacy shop URLs → /carboncredits
[[redirects]]
  from = "/carbon-credits"
  to = "/carboncredits"
  status = 301

[[redirects]]
  from = "/category/*"
  to = "/carboncredits"
  status = 301

[[redirects]]
  from = "/shop"
  to = "/carboncredits"
  status = 301

[[redirects]]
  from = "/shop/*"
  to = "/carboncredits"
  status = 301

# Legacy projects URL → /carboncredits with hash
[[redirects]]
  from = "/our-projects"
  to = "/carboncredits#projects"
  status = 301

# Blog routes are now handled internally by the React app
# (Legacy Wix redirects removed)

# Route naming redirects (old names → new canonical names)
[[redirects]]
  from = "/flights"
  to = "/flight-offset"
  status = 301

[[redirects]]
  from = "/courses"
  to = "/course"
  status = 301

# SPA fallback - MUST BE LAST
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
